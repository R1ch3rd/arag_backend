AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: RAG System Backend Infrastructure

Globals:
  Function:
    Timeout: 30
    MemorySize: 512
    Runtime: python3.13
    Environment:
      Variables:
        USERS_TABLE: !Ref UsersTable
        DOCUMENTS_TABLE: !Ref DocumentsTable
        SESSIONS_TABLE: !Ref SessionsTable
        MESSAGES_TABLE: !Ref MessagesTable
        DOCUMENTS_BUCKET: !Ref DocumentsBucketName
        PINECONE_API_KEY: !Ref PineconeApiKey
        PINECONE_ENV: !Ref PineconeEnv
        PINECONE_INDEX: !Ref PineconeIndex
        UPSTASH_REDIS_REST_URL: !Ref UpstashRedisUrl
        UPSTASH_REDIS_REST_TOKEN: !Ref UpstashRedisToken
        HF_API_TOKEN: !Ref HuggingFaceToken
        LLM_PROVIDER: !Ref LLMProvider
        TOGETHER_API_KEY: !Ref TogetherApiKey
        GEMINI_API_KEY: !Ref GeminiApiKey

Parameters:
  PineconeApiKey:
    Type: String
    NoEcho: true
  PineconeEnv:
    Type: String
    Default: gcp-starter
  PineconeIndex:
    Type: String
    Default: rag-documents
  UpstashRedisUrl:
    Type: String
    NoEcho: true
  UpstashRedisToken:
    Type: String
    NoEcho: true
  HuggingFaceToken:
    Type: String
    NoEcho: true
  LLMProvider:
    Type: String
    Default: together
    AllowedValues: [together, gemini]
  TogetherApiKey:
    Type: String
    NoEcho: true
    Default: ""
  GeminiApiKey:
    Type: String
    NoEcho: true
    Description: Google Gemini API Key

  DocumentsBucketName:
    Type: String
    Default: rag-documents-536697240321
    Description: Existing S3 bucket for document storage

Resources:
  # Cognito User Pool
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: rag-system-users
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
      Schema:
        - Name: email
          AttributeDataType: String
          Required: true
          Mutable: false

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: rag-system-web
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      PreventUserExistenceErrors: ENABLED

  # API Gateway
  Api:
    Type: AWS::Serverless::Api
    Properties:
      Name: rag-system-api
      StageName: prod
      # Cost guardrail: cap the whole stage so runaway traffic can't
      # push Lambda/API GW past free-tier territory.
      MethodSettings:
        - ResourcePath: "/*"
          HttpMethod: "*"
          ThrottlingRateLimit: 5
          ThrottlingBurstLimit: 10
      Cors:
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
        AllowOrigin: "'*'"
      Auth:
        DefaultAuthorizer: CognitoAuthorizer
        Authorizers:
          CognitoAuthorizer:
            UserPoolArn: !GetAtt UserPool.Arn
            Identity:
              Header: Authorization
            AuthorizationType: COGNITO_USER_POOLS

  # DynamoDB Tables
  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: rag-users
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE

  DocumentsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: rag-documents
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE

  SessionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: rag-sessions
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE

  MessagesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: rag-messages
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE

  # Lambda Functions - FIXED WITH INDIVIDUAL OPTIONS EVENTS
  DocumentUploadFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: lambdas/
      Handler: documents.handler.upload_handler
      Events:
        ApiEvent:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /documents/upload
            Method: POST
        OptionsEvent:  # ✅ ADDED OPTIONS EVENT
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /documents/upload
            Method: OPTIONS
            Auth:
              Authorizer: NONE
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref DocumentsTable
        - S3CrudPolicy:
            BucketName: !Ref DocumentsBucketName
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - cognito-idp:AdminGetUser
              Resource: !GetAtt UserPool.Arn

  DocumentListFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: lambdas/
      Handler: documents.handler.list_handler
      Events:
        ApiEvent:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /documents
            Method: GET
        OptionsEvent:  # ✅ ADDED OPTIONS EVENT
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /documents
            Method: OPTIONS
            Auth:
              Authorizer: NONE
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref DocumentsTable

  DocumentToggleFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: lambdas/
      Handler: documents.handler.toggle_handler
      Events:
        ApiEvent:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /documents/{document_id}/toggle
            Method: PUT
        OptionsEvent:  # ✅ ADDED OPTIONS EVENT
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /documents/{document_id}/toggle
            Method: OPTIONS
            Auth:
              Authorizer: NONE
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref DocumentsTable

  DocumentDeleteFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: lambdas/
      Handler: documents.handler.delete_handler
      Events:
        ApiEvent:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /documents/{document_id}
            Method: DELETE
        OptionsEvent:  # ✅ ADDED OPTIONS EVENT
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /documents/{document_id}
            Method: OPTIONS
            Auth:
              Authorizer: NONE
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref DocumentsTable
        - S3CrudPolicy:
            BucketName: !Ref DocumentsBucketName

  # Chat Functions - CLEANED UP (REMOVED DOCUMENT OPTIONS)
  ChatRouterFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: lambdas/
      Handler: chat.handler.handler_router
      Timeout: 60
      MemorySize: 1024
      Events:
        # Session Management
        CreateSession:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /chat/sessions
            Method: POST
        ListSessions:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /chat/sessions
            Method: GET
        UpdateSession:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /chat/sessions/{session_id}
            Method: PUT
        DeleteSession:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /chat/sessions/{session_id}
            Method: DELETE
        SearchSessions:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /chat/sessions/search
            Method: GET
        ExportSession:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /chat/sessions/{session_id}/export
            Method: GET
        # Message Operations
        SendMessage:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /chat/sessions/{session_id}/messages
            Method: POST
        GetMessages:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /chat/sessions/{session_id}/messages
            Method: GET
        # OPTIONS for CHAT endpoints only
        OptionsChatSessions:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /chat/sessions
            Method: OPTIONS
            Auth:
              Authorizer: NONE
        OptionsChatSessionsWithId:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /chat/sessions/{session_id}
            Method: OPTIONS
            Auth:
              Authorizer: NONE
        OptionsChatMessages:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /chat/sessions/{session_id}/messages
            Method: OPTIONS
            Auth:
              Authorizer: NONE
        OptionsCache:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /cache/{proxy+}
            Method: OPTIONS
            Auth:
              Authorizer: NONE
        # Public guest chat: powers "try as guest" on the aRAG site and
        # the chat widget embedded on the portfolio. No Cognito; the
        # handler enforces per-IP rate limits via Upstash.
        GuestChat:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /guest/chat
            Method: POST
            Auth:
              Authorizer: NONE
        OptionsGuestChat:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /guest/chat
            Method: OPTIONS
            Auth:
              Authorizer: NONE
        # Keep one container warm: cold starts (pinecone + torch-free but
        # heavy imports) can exceed API Gateway's 29s cap and surface as
        # CORS failures in browsers. ~8.6K invocations/month, free tier.
        WarmerSchedule:
          Type: Schedule
          Properties:
            Schedule: rate(5 minutes)
            Input: '{"path": "/warmer", "httpMethod": "GET"}'
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SessionsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref MessagesTable
        - DynamoDBReadPolicy:
            TableName: !Ref DocumentsTable

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${Api}.execute-api.${AWS::Region}.amazonaws.com/prod"

  UserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref UserPool

  UserPoolClientId:
    Description: Cognito User Pool Client ID
    Value: !Ref UserPoolClient

  DocumentsBucketName:
    Description: S3 Bucket for documents
    Value: !Ref DocumentsBucketName